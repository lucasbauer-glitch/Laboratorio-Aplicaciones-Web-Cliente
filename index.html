<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/styles.css?v=2">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Features</a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="search-container">
                <form class="d-flex" role="search" style="margin: 0; width: 100%; max-width: 250px;">
                    <input id="search-input" class="form-control" type="search" placeholder="Search" aria-label="Search"
                        style="width: 100%; box-sizing: border-box;" />
                </form>
            </div>
            <div class="cart-container" style="flex: 1; display: flex; justify-content: flex-end; align-items: center;">
                <button id="cart-button"
                    style="background: white; border: 1px solid black; border-radius: 5px; padding: 5px 12px; font-size: 24px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center;"
                    title="Ver carrito">
                    🛒
                    <span id="cart-counter"
                        style="position: absolute; top: -8px; right: -8px; background-color: #ff3b30; color: white; border-radius: 12px; padding: 2px 6px; font-size: 12px; font-weight: bold;">0</span>
                </button>
            </div>
        </nav>

    </header>
    <main>
        <section id="product-list">

        </section>

        <dialog id="product-modal">
            <div class="modal-content"
                style="display: flex; flex-direction: column; align-items: center; text-align: center;">
                <img id="modal-image" src="" alt="Imagen del producto"
                    style="width: 360px; height: 360px; object-fit: contain;" />
                <h2 id="modal-title"></h2>
                <p id="modal-description"></p>
                <p id="modal-price"></p>
                <div style="display: flex; flex-direction: row; gap: 15px; margin-top: 10px;">
                    <button id="close-modal">Cerrar</button>
                    <button id="agregar-carrito">Agregar al carrito</button>
                </div>
            </div>
        </dialog>

        <dialog id="cart-modal">
            <div class="cart-modal-content" style="display: flex; flex-direction: column; height: 100%;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px;">
                    <h2 style="margin: 0;">Tu Carrito</h2>
                    <button id="close-cart-modal"
                        style="cursor: pointer; background: none; border: none; font-size: 28px; line-height: 1;">&times;</button>
                </div>
                <div id="cart-items-container"
                    style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1;">
                </div>
                <div style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: auto;">
                    <button id="checkout-btn"
                        style="width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">Ir
                        al pago</button>
                </div>
            </div>
        </dialog>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/main.js?v=2"></script>

</body>

</html>
