<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/styles.css?v=2">
</head>

<body>
    <header>
        <div class="header-main-row">
            <a class="nav-logo" href="#">MiTienda<span>.</span></a>
            
            <div class="nav-actions">
                <button id="cart-button" class="cart-icon-btn" title="Ver carrito">
                    <span class="icon">🛒</span>
                    <span id="cart-counter">0</span>
                </button>
            </div>
        </div>

        <div class="search-container-below">
            <div class="search-wrapper">
                <input id="search-input" type="search" placeholder="Buscar productos..." aria-label="Search" />
                <button class="search-btn">🔍</button>
            </div>
        </div>
    </header>

    <main>
        <section id="product-list">

        </section>

        <dialog id="product-modal">
            <div class="modal-content" style="position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; padding-top: 30px;">
                <button id="close-modal" style="position: absolute; top: 0; right: 0; background: none; border: none; font-size: 30px; cursor: pointer; padding: 10px; line-height: 1;">
                    &times;
                </button>

                <img id="modal-image" src="" alt="Imagen del producto" style="width: 300px; height: 300px; object-fit: contain;" />
                <h2 id="modal-title" style="margin: 15px 0 10px 0;"></h2>
                <p id="modal-description" style="color: #666; font-size: 14px; margin-bottom: 10px;"></p>
                <p id="modal-price" style="font-weight: bold; font-size: 18px;"></p>
                
                <div style="margin-top: 20px; width: 100%;">
                    <button id="agregar-carrito" style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                        Agregar al carrito
                    </button>
                </div>
            </div>
        </dialog>

        <dialog id="cart-modal">
            <div class="cart-modal-content" style="display: flex; flex-direction: column; height: 100%;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px;">
                    <h2 style="margin: 0;">Tu Carrito</h2>
                    <button id="close-cart-modal"
                        style="cursor: pointer; background: none; border: none; font-size: 28px; line-height: 1;">&times;</button>
                </div>
                <div id="cart-items-container"
                    style="display: flex; flex-direction: column; gap: 15px; overflow-y: auto; flex: 1;">
                </div>
                <div style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: auto;">
                    <button id="checkout-btn"
                        style="width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">Ir
                        al pago</button>
                </div>
            </div>
        </dialog>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="./js/main.js?v=2"></script>

</body>

</html>
